[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/rentals"
  to = "/rentals.html"
  status = 200

[[redirects]]
  from = "/school-events"
  to = "/school-events.html"
  status = 200

[[redirects]]
  from = "/about"
